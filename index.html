<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Country Battle Overlay</title>
<style>
body {
    margin: 0;
    background: transparent;
    color: white;
    font-family: Arial, sans-serif;
    overflow: hidden;
}
#game-container {
    display: flex;
    width: 100vw;
    height: 100vh;
    box-sizing: border-box;
    padding: 10px;
}
#arena-wrapper {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
}
#arena {
    width: 90vw;
    height: 90vw;
    max-width: 450px;
    max-height: 450px;
    border: 6px solid #38bdf8;
    border-radius: 50%;
    position: relative;
    overflow: hidden;
    background: rgba(15, 23, 42, 0.85);
    box-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
}
.flag {
    position: absolute;
    font-size: 35px;
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
}
#leaderboard-wrapper {
    width: 220px;
    background: rgba(15, 23, 42, 0.9);
    border-left: 3px solid #38bdf8;
    padding: 10px;
    box-sizing: border-box;
}
h2 {
    margin: 0 0 10px 0;
    font-size: 18px;
    text-align: center;
    color: #38bdf8;
}
table {
    width: 100%;
    font-size: 14px;
    border-collapse: collapse;
}
td, th {
    padding: 6px 4px;
    text-align: left;
    border-bottom: 1px solid #334155;
}
.rank-1 { color: #f59e0b; font-weight: bold; }
</style>
</head>
<body>
<div id="game-container">
    <div id="arena-wrapper"><div id="arena"></div></div>
    <div id="leaderboard-wrapper">
        <h2>📊 RANKING</h2>
        <table>
            <tbody id="leaderboard"></tbody>
        </table>
    </div>
</div>
<script>
const flags = {
    bangladesh: { emoji: "🇧🇩", name: "BD" },
    india: { emoji: "🇮🇳", name: "IND" },
    pakistan: { emoji: "🇵🇰", name: "PAK" },
    usa: { emoji: "🇺🇸", name: "USA" },
    uk: { emoji: "🇬🇧", name: "UK" },
    canada: { emoji: "🇨🇦", name: "CAN" },
    brazil: { emoji: "🇧🇷", name: "BRA" },
    argentina: { emoji: "🇦🇷", name: "ARG" }
};
let scores = {};
const ws = new WebSocket(location.origin.replace(/^http/, 'ws'));
ws.onmessage = (event) => {
    const data = JSON.parse(event.data);
    const countryKey = data.country;
    if (flags[countryKey]) {
        scores[countryKey] = (scores[countryKey] || 0) + 1;
        createBouncingFlag(flags[countryKey].emoji);
        updateBoard();
    }
};
function createBouncingFlag(emoji) {
    let arena = document.getElementById("arena");
    let flag = document.createElement("div");
    flag.className = "flag";
    flag.innerHTML = emoji;
    arena.appendChild(flag);
    let size = arena.clientWidth;
    let x = size / 2, y = size / 2;
    let dx = (Math.random() - 0.5) * 5;
    let dy = (Math.random() - 0.5) * 5;
    function animate() {
        x += dx; y += dy;
        let radius = (size / 2) - 25;
        let dist = Math.hypot(x + 20 - (size/2), y + 20 - (size/2));
        if (dist >= radius) {
            let nx = (x + 20 - (size/2)) / dist;
            let ny = (y + 20 - (size/2)) / dist;
            let dot = dx * nx + dy * ny;
            dx -= 2 * dot * nx; dy -= 2 * dot * ny;
        }
        flag.style.left = x + "px"; flag.style.top = y + "px";
        requestAnimationFrame(animate);
    }
    animate();
}
function updateBoard() {
    let data = Object.entries(scores).sort((a, b) => b[1] - a[1]);
    let html = '';
    data.forEach((x, i) => {
        let cls = i === 0 ? 'class="rank-1"' : '';
        html += `<tr ${cls}><td>#${i + 1}</td><td>${flags[x[0]].emoji} ${flags[x[0]].name}</td><td>${x[1]}</td></tr>`;
    });
    document.getElementById("leaderboard").innerHTML = html;
}
</script>
</body>
</html>
